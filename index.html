<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat vs Duck</title>
    <link rel="stylesheet" href="ZTest_CSS.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>


<body id="distract_mode" class="distract_mode">
<div class="" id="startScreen">
  <h1>Pick which side will win!</h1>
  <p>
    <span id="CoinFlip">Kitties</span>
    <span> go first.</span>
  </p>
  <p>(Click To Start)</p>
</div>

<div class="endScreen" id="endScreen">
  <h1 class="endMessageTitle" id="endMessageTitle">Placeholder Text</h1>
  <p>
    <span class="endMessage" id="endMessage">Placeholder Text</span>
    <span> Play again?</span>
  </p>
  <a href="https://bug-on-ship.github.io/Ducks-Vs-Cats/"> Go again! </a>
</div>


<div class="game-container">
      <div class="title">Duckies Vs Kitties</div>
      <div id="round" class="floating-text">Who will win?</div>
      <div class = "floating-text2">
        <p>
          <span id="CoinFlip2">Kitties</span>
          <span> go first.</span>
        </p>  
      </div>
<!--      <button id="distract_button" class="floating-text3" type="button">Distraction_Mode</button>  -->
  <div id="cardKittyID" class="card cardKitty">

    <div class="image-area">
      <img id="catimg" src="" alt="cat">
    </div>

    <div id="KNAME" class="card-footer"> <!-- 17 chars of W (longest letter possible)-->
      KittyName
    </div>

<table id="KTable" class="stat-tables" style="width:100%">

  <tr>
    <td>HP</td>
    <td>ATK</td>
    <td>DEF</td>
  </tr>
  <tr>
    <td id="KHP"></td>
    <td id="KATK"></td>
    <td id="KDEF"></td>
  </tr>
</table>


  </div>

  <div id="cardDuckyID" class="card cardDucky">

    <div class="image-area">
      <img id="duckimg" src="" alt="duck">
    </div>

    <div id="DNAME" class="card-footer">
      DuckName
    </div>

<table id="DTable" class="stat-tables" style="width:100%">
  <tr>
    <td>HP</td>
    <td>ATK</td>
    <td>DEF</td>
  </tr>
  <tr>
    <td id="DHP"></td>
    <td id="DATK"></td>
    <td id="DDEF"></td>
  </tr>
</table>

  </div>
</div>                                   <!---------------------------- -->


  </div>
  <script  type="module" src="ZTest_JS.js"></script>

  </body>
</html>
